<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<title>Airbnb – Stays, Experiences, and Places</title>
<link href="https://fonts.googleapis.com/css2?family=Circular+Std:wght@300;400;500;600;700&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #222; }

  /* NAVBAR */
  .navbar {
    position: sticky; top: 0; z-index: 100;
    background: #fff;
    border-bottom: 1px solid #ebebeb;
    padding: 16px 80px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-skip { font-size: 12px; color: #222; text-decoration: none; }
  .nav-skip span { color: #ff385c; font-weight: 700; }

  .nav-center { display: flex; gap: 32px; align-items: center; }
  .nav-link { font-size: 14px; font-weight: 600; color: #222; text-decoration: none; padding-bottom: 4px; border-bottom: 2px solid transparent; }
  .nav-link.active { border-bottom: 2px solid #222; }

  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-host { font-size: 14px; font-weight: 600; color: #222; cursor: pointer; padding: 10px 14px; border-radius: 24px; transition: background .15s; }
  .nav-host:hover { background: #f7f7f7; }
  .nav-globe { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background .15s; }
  .nav-globe:hover { background: #f7f7f7; }
  .nav-menu-btn {
    display: flex; align-items: center; gap: 10px;
    border: 1px solid #ddd; border-radius: 24px; padding: 6px 8px 6px 14px; cursor: pointer;
    transition: box-shadow .15s;
  }
  .nav-menu-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,.12); }
  .nav-avatar { width: 32px; height: 32px; border-radius: 50%; background: #222; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; }

  /* SEARCH BAR */
  .search-section { padding: 24px 80px 20px; display: flex; justify-content: center; }
  .search-bar {
    display: flex; align-items: center;
    border: 1px solid #ddd; border-radius: 40px;
    box-shadow: 0 1px 2px rgba(0,0,0,.08);
    overflow: hidden;
    background: #fff;
    transition: box-shadow .2s;
    max-width: 860px; width: 100%;
  }
  .search-bar:hover { box-shadow: 0 2px 8px rgba(0,0,0,.12); }
  .search-field {
    padding: 14px 24px;
    cursor: pointer;
    flex: 1;
    border-right: 1px solid #ebebeb;
    transition: background .15s;
  }
  .search-field:last-of-type { border-right: none; }
  .search-field:hover { background: #f7f7f7; border-radius: 40px; }
  .search-field label { display: block; font-size: 11px; font-weight: 700; color: #222; }
  .search-field span { font-size: 13px; color: #717171; }
  .search-btn {
    background: #ff385c; border: none; border-radius: 50%; width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center; cursor: pointer; margin: 8px;
    transition: transform .1s, background .1s; flex-shrink: 0;
  }
  .search-btn:hover { background: #e31c5f; transform: scale(1.05); }
  .search-btn svg { color: #fff; }

  /* CATEGORY PILLS */
  .categories {
    padding: 0 80px 20px;
    border-bottom: 1px solid #ebebeb;
    display: flex; align-items: center; gap: 0;
    overflow-x: auto; scrollbar-width: none;
    position: relative;
  }
  .categories::-webkit-scrollbar { display: none; }
  .category {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    opacity: 0.65;
    transition: opacity .15s, border-color .15s;
    white-space: nowrap; flex-shrink: 0;
    color: #717171;
    font-size: 12px; font-weight: 600;
    min-width: 72px;
  }
  .category:hover { opacity: 1; border-bottom-color: #717171; color: #222; }
  .category.active { opacity: 1; border-bottom-color: #222; color: #222; }
  .category svg { width: 24px; height: 24px; }
  .cat-scroll-btn {
    width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ddd;
    background: #fff; display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; box-shadow: 0 1px 3px rgba(0,0,0,.12);
    transition: box-shadow .15s;
  }
  .cat-scroll-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,.15); }

  .cat-right-controls { display: flex; align-items: center; gap: 12px; margin-left: auto; padding-left: 12px; flex-shrink: 0; }
  .filter-btn {
    display: flex; align-items: center; gap: 8px;
    border: 1px solid #ddd; border-radius: 12px; padding: 10px 16px;
    font-size: 14px; font-weight: 600; cursor: pointer; background: #fff;
    transition: box-shadow .15s;
  }
  .filter-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,.12); }
  .toggle-label { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; white-space: nowrap; cursor: pointer; }
  .toggle { width: 48px; height: 26px; background: #ddd; border-radius: 13px; position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; }
  .toggle-knob { width: 22px; height: 22px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: left .2s; box-shadow: 0 1px 3px rgba(0,0,0,.3); }

  /* LISTINGS GRID */
  .listings-section { padding: 32px 80px 60px; }
  .listings-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 24px 20px;
  }
  @media (max-width: 1400px) { .listings-grid { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 900px) { .listings-grid { grid-template-columns: repeat(2, 1fr); } }

  .listing-card { cursor: pointer; }
  .listing-img-wrap {
    position: relative; border-radius: 14px; overflow: hidden;
    aspect-ratio: 1 / 1;
    background: #f0f0f0;
  }
  .listing-img-wrap img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform .3s ease;
    display: block;
  }
  .listing-card:hover .listing-img-wrap img { transform: scale(1.03); }
  .guest-fav {
    position: absolute; top: 12px; left: 12px;
    background: #fff; border-radius: 20px; padding: 5px 10px;
    font-size: 12px; font-weight: 700; color: #222;
    box-shadow: 0 1px 4px rgba(0,0,0,.12);
  }
  .heart-btn {
    position: absolute; top: 12px; right: 12px;
    background: none; border: none; cursor: pointer;
    color: #fff; transition: transform .15s;
  }
  .heart-btn:hover { transform: scale(1.1); }
  .heart-btn svg { filter: drop-shadow(0 1px 2px rgba(0,0,0,.3)); }
  .dots {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.7); }
  .dot.active { background: #fff; width: 6px; }

  .listing-info { padding: 10px 0 0; }
  .listing-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .listing-location { font-size: 14px; font-weight: 700; color: #222; }
  .listing-rating { display: flex; align-items: center; gap: 4px; font-size: 14px; font-weight: 500; }
  .listing-views { font-size: 13px; color: #717171; margin: 2px 0; }
  .listing-dates { font-size: 13px; color: #717171; }
  .listing-price { margin-top: 4px; font-size: 14px; color: #222; }
  .listing-price strong { font-weight: 700; }

  /* STAR ICON */
  .star { color: #222; }
</style>

        </span>
      </div>
      <div class="listing-views">${l.views}</div>
      <div class="listing-dates">${l.dates}</div>
      <div class="listing-price"><strong>${l.price}</strong></div>
    </div>
  `;
  grid.appendChild(card);
});

// Toggle interaction
document.querySelector('.toggle').addEventListener('click', function() {
  const knob = this.querySelector('.toggle-knob');
  const isOn = knob.style.left === '26px';
  knob.style.left = isOn ? '2px' : '26px';
  this.style.background = isOn ? '#ddd' : '#222';
});
</script>
</body>
</html>
